<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep blue to red -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <!-- Shelf gradient -->
    <linearGradient id="shelfGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <!-- Glass shine -->
    <linearGradient id="glassShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Card glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Glass overlay on top half -->
  <rect x="16" y="16" width="480" height="240" rx="96" ry="96" fill="url(#glassShine)"/>

  <!-- Shelf panel (glass card) -->
  <rect x="96" y="80" width="320" height="352" rx="28" ry="28"
        fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.25)" stroke-width="2"
        filter="url(#softShadow)"/>

  <!-- Shelf panel inner glass shine -->
  <rect x="96" y="80" width="320" height="176" rx="28" ry="28"
        fill="url(#glassShine)"/>

  <!-- Title bar area -->
  <rect x="112" y="96" width="288" height="28" rx="6" ry="6" fill="rgba(255,255,255,0.08)"/>
  <!-- Title bar dots -->
  <circle cx="130" cy="110" r="5" fill="#f87171"/>
  <circle cx="148" cy="110" r="5" fill="#fbbf24"/>
  <circle cx="166" cy="110" r="5" fill="#34d399"/>
  <!-- Title text hint -->
  <rect x="200" y="104" width="80" height="12" rx="3" fill="rgba(255,255,255,0.3)"/>

  <!-- Shelf item card 1: Image card (blue tint) -->
  <rect x="120" y="140" width="272" height="64" rx="12" ry="12"
        fill="rgba(59,130,246,0.2)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Thumbnail square -->
  <rect x="132" y="150" width="44" height="44" rx="8" fill="rgba(96,165,250,0.4)"/>
  <!-- Image icon inside thumbnail -->
  <path d="M144 174 L154 164 L160 170 L168 160 L176 174 Z" fill="rgba(255,255,255,0.7)"/>
  <circle cx="152" cy="162" r="3" fill="rgba(255,255,255,0.6)"/>
  <!-- File name lines -->
  <rect x="188" y="158" width="120" height="10" rx="3" fill="rgba(255,255,255,0.35)"/>
  <rect x="188" y="176" width="72" height="8" rx="3" fill="rgba(255,255,255,0.18)"/>

  <!-- Shelf item card 2: File card (red tint) -->
  <rect x="120" y="216" width="272" height="64" rx="12" ry="12"
        fill="rgba(220,38,38,0.2)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- File badge -->
  <rect x="132" y="230" width="44" height="36" rx="6" fill="rgba(248,113,113,0.4)"/>
  <text x="154" y="254" font-family="sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle" opacity="0.8">PDF</text>
  <!-- File name lines -->
  <rect x="188" y="236" width="140" height="10" rx="3" fill="rgba(255,255,255,0.35)"/>
  <rect x="188" y="254" width="64" height="8" rx="3" fill="rgba(255,255,255,0.18)"/>

  <!-- Shelf item card 3: Text snippet (white tint) -->
  <rect x="120" y="292" width="272" height="56" rx="12" ry="12"
        fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Text lines -->
  <rect x="136" y="308" width="240" height="8" rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="136" y="324" width="180" height="8" rx="3" fill="rgba(255,255,255,0.18)"/>

  <!-- Drop zone hint at bottom -->
  <rect x="120" y="360" width="272" height="56" rx="12" ry="12"
        fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="8,6"/>
  <!-- Plus icon -->
  <line x1="256" y1="378" x2="256" y2="404" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
  <line x1="243" y1="391" x2="269" y2="391" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>
</svg>
